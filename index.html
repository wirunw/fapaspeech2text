<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAPA 2026 — Live Transcribe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Sarabun:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --red:#5B2C83; --red-dark:#42206A; --red-50:#F3EEF8; --red-100:#E3D6EF;
    --gold:#C9A227; --gold-dark:#A8842B;
    --bg:#faf9fc; --panel:#ffffff; --text:#1a1626; --muted:#6b6480;
    --border:#e7e3ef; --interim:#a99fc0; --fs:34px;
  }
  body.dark{
    --red:#A678D6; --red-dark:#8A5BC0; --red-50:#2a1f3d; --red-100:#3d2b57;
    --gold:#E0BE5A; --gold-dark:#C9A227;
    --bg:#140f1e; --panel:#1d1730; --text:#f1edf7; --muted:#a99fc0;
    --border:#332a48; --interim:#6f6488;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:"Sarabun","Roboto",-apple-system,BlinkMacSystemFont,sans-serif;
    background:var(--bg); color:var(--text); height:100vh;
    display:flex; flex-direction:column; overflow:hidden; transition:background .2s,color .2s;
  }
  header{
    display:flex; align-items:center; gap:12px; padding:12px 22px;
    background:var(--panel); border-bottom:1px solid var(--border); flex-wrap:wrap;
  }
  .hero{display:flex; justify-content:center; background:var(--bg); padding:12px; border-bottom:3px solid var(--gold)}
  .hero .card{background:#fff; border-radius:14px; padding:8px 26px; box-shadow:0 2px 12px rgba(91,44,131,.14)}
  .hero img{height:54px; width:auto; display:block}
  body.present .hero{display:none}
  .brand{display:flex; flex-direction:column; line-height:1.15}
  .brand .title{color:var(--red); font-weight:700; font-size:17px}
  .brand small{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.3px}
  .spacer{flex:1}
  select,button{
    font-family:inherit; font-size:14px; border-radius:10px;
    border:1px solid var(--border); background:var(--panel); color:var(--text);
    padding:9px 14px; cursor:pointer; transition:.15s;
  }
  select:hover,button:hover{border-color:var(--red)}
  button.primary{background:var(--red); color:#fff; border-color:var(--red); font-weight:700}
  button.primary:hover{background:var(--red-dark)}
  button.danger{background:var(--panel); color:var(--red); border-color:var(--red); font-weight:700}
  button:disabled{opacity:.4; cursor:not-allowed}
  .icon-btn{padding:9px 12px;font-size:16px;line-height:1}
  .pill{
    display:flex; align-items:center; gap:8px; font-size:13px; color:var(--muted);
    padding:6px 12px; background:var(--red-50); border-radius:20px; border:1px solid var(--red-100);
  }
  .dot{width:10px;height:10px;border-radius:50%;background:#cbd5e1}
  .dot.live{background:var(--red); animation:pulse 1.2s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.25}}
  .lang-toggle{display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden}
  .lang-toggle button{border:0;border-radius:0;padding:8px 12px;font-size:13px;background:var(--panel)}
  .lang-toggle button.on{background:var(--red);color:#fff;font-weight:700}

  /* แถบเตือน (file:// / ไมค์บล็อก / ไม่มีเน็ต) */
  .alert{display:none; background:#7a1020; color:#fff; font-size:13.5px; padding:10px 22px; line-height:1.55}
  .alert.show{display:block}
  .alert b{color:#ffd66b}

  .remark{
    background:var(--red-50); color:var(--red-dark); font-size:12.5px;
    padding:7px 22px; border-bottom:1px solid var(--red-100); line-height:1.5;
  }
  body.dark .remark{color:#ffb4ab}
  .remark b{font-weight:700}

  main{flex:1; position:relative; overflow:hidden}
  #stage{height:100%; overflow-y:auto; padding:30px 7vw; line-height:1.3; scroll-behavior:smooth}
  #editor{
    font-size:var(--fs); font-weight:500; white-space:pre-wrap; word-break:break-word;
    outline:none; min-height:50px; border-radius:10px; transition:box-shadow .15s;
  }
  #editor:focus{box-shadow:0 0 0 2px var(--red-100)}
  #interim{color:var(--interim)}
  .placeholder{color:var(--muted); font-size:21px; text-align:center; margin-top:15vh}
  .placeholder b{color:var(--red)}
  .placeholder em{display:block;font-size:14px;margin-top:10px;font-style:normal;opacity:.8}

  footer{
    display:flex; align-items:center; gap:10px; padding:11px 22px;
    background:var(--panel); border-top:1px solid var(--border); flex-wrap:wrap;
  }
  .stat{font-size:13px; color:var(--muted); padding:0 6px}
  .stat b{color:var(--text); font-variant-numeric:tabular-nums}
  .fsctl{display:flex; align-items:center; gap:6px}
  .hint{font-size:12px; color:var(--muted)}
  .credit{font-size:12px;color:var(--muted);padding:0 6px}
  .credit b{color:var(--gold-dark)}

  body.present header,body.present footer,body.present .remark,body.present .alert{display:none}
  body.present #stage{padding:6vh 6vw}
  .exitp{position:fixed; top:16px; right:16px; z-index:10; display:none}
  body.present .exitp{display:block}
</style>
</head>
<body>
  <div class="hero">
    <div class="card">
      <img src="https://s3.ap-southeast-1.amazonaws.com/com.awesomeet/cdm.awesomeet.com/event_fapa2026/storage/Home-KVIlogo.png" alt="FAPA 2026 Bangkok">
    </div>
  </div>

  <div class="alert" id="alert"></div>

  <header>
    <div class="brand">
      <span class="title">Live Transcribe</span>
      <small data-i18n="subtitle"></small>
    </div>
    <div class="pill"><span class="dot" id="statusDot"></span><span id="statusText"></span></div>
    <div class="spacer"></div>
    <button id="btnTheme" class="icon-btn" title="Theme">🌙</button>
    <div class="lang-toggle" id="uiLang">
      <button data-ui="th" class="on">ไทย</button>
      <button data-ui="en">EN</button>
    </div>
    <label class="hint" data-i18n="speechLangLabel"></label>
    <select id="lang">
      <option value="th-TH">ไทย (Thai)</option>
      <option value="en-US">English (US)</option>
      <option value="en-GB">English (UK)</option>
      <option value="zh-CN">中文 (Chinese)</option>
      <option value="ja-JP">日本語 (Japanese)</option>
      <option value="ko-KR">한국어 (Korean)</option>
      <option value="id-ID">Bahasa Indonesia</option>
      <option value="ms-MY">Bahasa Melayu</option>
    </select>
    <button id="btnPresent" data-i18n="present"></button>
  </header>

  <div class="remark" id="remark"></div>

  <main>
    <div id="stage">
      <div class="placeholder" id="ph"></div>
      <div id="editor" contenteditable="true" spellcheck="false"><span id="interim" contenteditable="false"></span></div>
    </div>
  </main>
  <button class="exitp danger" id="btnExitP" onclick="togglePresent()"></button>

  <footer>
    <button id="btnStart" class="primary"></button>
    <button id="btnStop" class="danger" disabled></button>
    <button id="btnClear"></button>
    <div class="spacer"></div>
    <div class="fsctl">
      <span class="hint" data-i18n="fontSize"></span>
      <button onclick="bumpFont(-4)">A−</button>
      <button onclick="bumpFont(4)">A+</button>
    </div>
    <span class="stat"><span data-i18n="time"></span> <b id="timer">00:00</b></span>
    <span class="stat"><span data-i18n="wordsLabel"></span> <b id="words">0</b></span>
    <button id="btnCopy"></button>
    <button id="btnSave"></button>
    <span class="credit" id="credit"></span>
  </footer>

<script>
/* ===================== i18n ===================== */
const I18N = {
  th:{
    subtitle:"ระบบถอดเสียงบรรยายแบบเรียลไทม์",
    ready:"พร้อมเริ่ม", listening:"🎤 กำลังฟัง… พูดได้เลย", stopped:"หยุดแล้ว",
    speechLangLabel:"ภาษาเสียง", present:"⛶ จอนำเสนอ", exitPresent:"ออกจากจอนำเสนอ (Esc)",
    start:"▶ เริ่มถอดเสียง", stop:"■ หยุด", clear:"ล้าง",
    fontSize:"ขนาดอักษร", time:"เวลา", wordsLabel:"คำ",
    copy:"คัดลอก", copied:"คัดลอกแล้ว ✓", save:"บันทึก .txt",
    placeholder:"กด <b>▶ เริ่มถอดเสียง</b> แล้วพูดได้เลย<em>ข้อความสีจาง = กำลังประมวลผล · สีเข้ม = ยืนยันแล้ว · คลิกที่ข้อความเพื่อพิมพ์แก้ไขได้ทันที</em>",
    remark:"<b>หมายเหตุ:</b> ข้อความถอดด้วย AI อาจคลาดเคลื่อนได้ โดยเฉพาะศัพท์เฉพาะทางการแพทย์/ชื่อยา ชื่อเฉพาะ ตัวเลข และเมื่อมีเสียงรบกวนหรือผู้พูดหลายคนพร้อมกัน — ควรตรวจทานก่อนนำไปใช้อ้างอิง",
    credit:"ออกแบบโดย ดร.ภก. วิรุณ เวชศิริ (R.Ph)",
    st_micBlocked:"ไมโครโฟนถูกบล็อก", st_noDevice:"ไม่พบไมโครโฟน",
    st_network:"ต่ออินเทอร์เน็ตไม่ได้", st_noSpeech:"ไม่พบเสียง… กำลังฟังต่อ",
    al_file:"⚠️ คุณกำลังเปิดไฟล์แบบ <b>file://</b> ซึ่ง <b>ไมโครโฟนจะใช้ไม่ได้</b> — กรุณาเปิดผ่าน <b>http://localhost:8000/...</b> แทน (พิมพ์ในแถบ URL)",
    al_blocked:"🎤 <b>ไมโครโฟนถูกบล็อก</b> — คลิกไอคอนกล้อง/ไมค์ที่ <b>ขวาสุดของแถบ URL</b> → เลือก <b>Allow</b> → แล้วกดเริ่มใหม่อีกครั้ง",
    al_network:"🌐 <b>ระบบถอดเสียงต้องใช้อินเทอร์เน็ต</b> — กรุณาตรวจสอบการเชื่อมต่อแล้วลองใหม่",
    al_unsupported:"⚠️ เบราว์เซอร์นี้ไม่รองรับการถอดเสียง — กรุณาใช้ <b>Google Chrome</b> หรือ <b>Microsoft Edge</b> บนคอมพิวเตอร์"
  },
  en:{
    subtitle:"Real-time session transcription",
    ready:"Ready", listening:"🎤 Listening… speak now", stopped:"Stopped",
    speechLangLabel:"Speech language", present:"⛶ Presentation", exitPresent:"Exit presentation (Esc)",
    start:"▶ Start", stop:"■ Stop", clear:"Clear",
    fontSize:"Font size", time:"Time", wordsLabel:"Words",
    copy:"Copy", copied:"Copied ✓", save:"Save .txt",
    placeholder:"Press <b>▶ Start</b> and begin speaking<em>Light text = interim · Dark text = final · Click the text to edit it directly</em>",
    remark:"<b>Note:</b> AI transcription may contain errors — especially with medical/drug terms, proper nouns, numbers, and in noisy or multi-speaker settings. Please review before citing.",
    credit:"Design by Dr. Wirun Wetsiri (R.Ph)",
    st_micBlocked:"Microphone blocked", st_noDevice:"No microphone found",
    st_network:"No internet connection", st_noSpeech:"No speech… still listening",
    al_file:"⚠️ You are opening this file via <b>file://</b>, so the <b>microphone will not work</b>. Please open it via <b>http://localhost:8000/...</b> instead (type it in the URL bar).",
    al_blocked:"🎤 <b>Microphone is blocked</b> — click the camera/mic icon at the <b>right end of the URL bar</b> → choose <b>Allow</b> → then press Start again.",
    al_network:"🌐 <b>Speech recognition needs internet</b> — please check your connection and try again.",
    al_unsupported:"⚠️ This browser does not support speech recognition — please use <b>Google Chrome</b> or <b>Microsoft Edge</b> on a computer."
  }
};
let UI = localStorage.getItem('fapa_ui') || "th";
const $ = id => document.getElementById(id);

/* ===================== Speech engine (เรียบง่าย + ทนทาน) ===================== */
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
let rec=null, listening=false, startTs=null, timerInt=null, lastFinalTs=null;
const PARA_GAP = 2500; // หยุดนานกว่านี้ = ขึ้นย่อหน้าใหม่

function setStatus(text, live){ $('statusText').textContent=text; $('statusDot').className='dot'+(live?' live':''); }
function showAlert(html){ const a=$('alert'); if(html){ a.innerHTML=html; a.classList.add('show'); } else a.classList.remove('show'); }

function getFinalText(){
  const clone=$('editor').cloneNode(true);
  const im=clone.querySelector('#interim'); if(im) im.remove();
  return clone.innerText;
}
function refreshPlaceholder(){
  const empty = !getFinalText().trim() && !$('interim').textContent;
  $('ph').style.display = empty ? 'block':'none';
}
function maybeScroll(){ const s=$('stage'); if(s.scrollHeight-s.scrollTop-s.clientHeight<160) s.scrollTop=s.scrollHeight; }

function insertFinal(t){
  const now=Date.now();
  let piece = (lastFinalTs && (now-lastFinalTs)>PARA_GAP ? "\n" : "") + t;
  lastFinalTs=now;
  if(!/[\s฀-๿]$/.test(piece)) piece+=" ";   // เว้นวรรคให้อ่านง่าย
  $('editor').insertBefore(document.createTextNode(piece), $('interim'));
}

function buildRec(){
  const r = new SR();
  r.lang = $('lang').value;
  r.continuous = true;
  r.interimResults = true;
  r.maxAlternatives = 1;

  r.onstart = () => { showAlert(null); setStatus(I18N[UI].listening, true); };
  r.onresult = e => {
    let interim="";
    for(let i=e.resultIndex;i<e.results.length;i++){
      const res=e.results[i];
      if(res.isFinal) insertFinal(res[0].transcript); else interim+=res[0].transcript;
    }
    $('interim').textContent=interim; refreshPlaceholder(); updateWords(); maybeScroll();
  };
  r.onerror = ev => {
    const t=I18N[UI];
    if(ev.error==='not-allowed' || ev.error==='service-not-allowed'){
      setStatus(t.st_micBlocked,false); showAlert(t.al_blocked); stopRec();
    } else if(ev.error==='audio-capture'){
      setStatus(t.st_noDevice,false); stopRec();
    } else if(ev.error==='network'){
      setStatus(t.st_network,false); showAlert(t.al_network);
    } else if(ev.error==='no-speech'){
      setStatus(t.st_noSpeech,true);   // ปล่อยให้ onend restart เอง
    }
  };
  r.onend = () => { if(listening && rec===r){ try{ r.start(); }catch(e){} } };
  return r;
}

function startRec(){
  if(!SR){ showAlert(I18N[UI].al_unsupported); return; }
  if(listening) return;
  rec = buildRec();
  listening = true;
  try{ rec.start(); }catch(e){}
  setStatus(I18N[UI].listening, true);
  $('btnStart').disabled=true; $('btnStop').disabled=false;
  if(!startTs){ startTs=Date.now(); timerInt=setInterval(tick,1000); }
}
function stopRec(){
  listening=false; if(rec){ try{ rec.stop(); }catch(e){} }
  setStatus(I18N[UI].stopped,false);
  $('btnStart').disabled=false; $('btnStop').disabled=true;
  $('interim').textContent=""; clearInterval(timerInt); timerInt=null; startTs=null; lastFinalTs=null;
  refreshPlaceholder();
}
function tick(){
  const s=Math.floor((Date.now()-startTs)/1000);
  $('timer').textContent=String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
}
function updateWords(){
  const txt=getFinalText().trim();
  const spaced=txt.split(/\s+/).filter(Boolean).length;
  const thaiChars=(txt.match(/[฀-๿]/g)||[]).length;
  $('words').textContent=Math.max(spaced,Math.round(thaiChars/4));
}
function bumpFont(d){
  const cur=parseInt(getComputedStyle(document.documentElement).getPropertyValue('--fs'))||34;
  document.documentElement.style.setProperty('--fs',Math.min(96,Math.max(18,cur+d))+'px');
}
function togglePresent(){
  document.body.classList.toggle('present');
  if(document.body.classList.contains('present')){
    if(document.documentElement.requestFullscreen) document.documentElement.requestFullscreen().catch(()=>{});
  } else if(document.fullscreenElement){ document.exitFullscreen().catch(()=>{}); }
}

/* ===================== i18n + theme apply ===================== */
function applyI18n(){
  const t=I18N[UI]; document.documentElement.lang=UI;
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.innerHTML=t[el.dataset.i18n]||el.textContent; });
  $('btnStart').textContent=t.start; $('btnStop').textContent=t.stop; $('btnClear').textContent=t.clear;
  $('btnCopy').textContent=t.copy; $('btnSave').textContent=t.save; $('btnExitP').textContent=t.exitPresent;
  $('remark').innerHTML=t.remark; $('credit').innerHTML=t.credit;
  refreshPlaceholder();
  if(!getFinalText().trim() && !$('interim').textContent) $('ph').innerHTML=t.placeholder;
  setStatus(listening ? t.listening : t.ready, listening);
  $('uiLang').querySelectorAll('button').forEach(b=>b.classList.toggle('on',b.dataset.ui===UI));
}
function applyTheme(){
  const dark=localStorage.getItem('fapa_theme')==='dark';
  document.body.classList.toggle('dark',dark);
  $('btnTheme').textContent=dark?'☀️':'🌙';
}

/* ===================== Wire up ===================== */
$('btnStart').onclick=startRec;
$('btnStop').onclick=stopRec;
$('btnClear').onclick=()=>{
  const ed=$('editor'), im=$('interim');
  [...ed.childNodes].forEach(n=>{ if(n!==im) ed.removeChild(n); });
  im.textContent=""; lastFinalTs=null; refreshPlaceholder(); updateWords();
};
$('btnCopy').onclick=()=>{ navigator.clipboard.writeText(getFinalText().trim()).then(()=>{
  $('btnCopy').textContent=I18N[UI].copied; setTimeout(()=>$('btnCopy').textContent=I18N[UI].copy,1500); }); };
$('btnSave').onclick=()=>{
  const blob=new Blob([getFinalText().trim()],{type:'text/plain;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='FAPA2026-transcript-'+new Date().toISOString().slice(0,16).replace(/[:T]/g,'-')+'.txt'; a.click(); };
$('btnPresent').onclick=togglePresent;
$('btnTheme').onclick=()=>{ localStorage.setItem('fapa_theme',document.body.classList.contains('dark')?'light':'dark'); applyTheme(); };
$('lang').onchange=()=>{
  if(!listening) return;          // ถ้ายังไม่เริ่ม ไม่ต้องทำอะไร
  // เปลี่ยนภาษากลางคัน: สลับเครื่องยนต์เป็นภาษาใหม่ต่อเนื่อง โดยไม่ล้างข้อความ/เวลา
  if(rec){ rec.onend=null; try{ rec.stop(); }catch(e){} }  // กันตัวเก่า auto-restart
  rec = buildRec();               // buildRec อ่านค่าภาษาใหม่จาก #lang เอง
  try{ rec.start(); }catch(e){}
};
$('editor').addEventListener('input', ()=>{ refreshPlaceholder(); updateWords(); });
$('uiLang').querySelectorAll('button').forEach(b=>{ b.onclick=()=>{ UI=b.dataset.ui; localStorage.setItem('fapa_ui',UI); applyI18n(); }; });
document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&document.body.classList.contains('present')) togglePresent(); });

/* ===================== Boot ===================== */
applyTheme();
applyI18n();
if(!SR) showAlert(I18N[UI].al_unsupported);
</script>
</body>
</html>
